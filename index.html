<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کانال‌های ما</title>
<style>

        font-family: Tahoma, sans-serif;

        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 15px;
    }
    .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 18px;
        padding: 30px 25px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.4rem; margin-bottom: 25px; }
    .link-btn {
        display: block;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        text-decoration: none;
        padding: 14px 16px;
        border-radius: 12px;
        margin-bottom: 12px;
        font-size: 1.05rem;
        font-weight: bold;
    }
    .footer-note { margin-top: 20px; }
    .footer-note small { color: #9ca3af; }
</style>
</head>
<body>
    <div class="card">
        <h1>📢 کانال‌های ما</h1>
        <a class="link-btn" href="https://splus.ir/eli_beauty48" target="_blank" rel="noopener">کانال سروش الی بیوتی</a>
